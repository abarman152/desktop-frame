# Issue template chooser configuration.
# Blank issues are disabled so every report uses a template and arrives triageable.
blank_issues_enabled: false
contact_links:
  - name: Question or help
    url: https://github.com/desktopframe/desktop-frame/blob/main/.github/SUPPORT.md
    about: How to get help and where to ask questions.
  - name: Ideas and discussion
    url: https://github.com/desktopframe/desktop-frame/discussions
    about: Propose and discuss ideas before they become feature requests.
  - name: Report a security issue
    url: https://github.com/desktopframe/desktop-frame/blob/main/.github/SECURITY.md
    about: Do not file public issues for vulnerabilities. Use the disclosure process.
